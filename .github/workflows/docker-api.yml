# ──────────────────────────────────────────────────────────────────────
# Dockerized REST API CI Workflow
# ──────────────────────────────────────────────────────────────────────

name: Dockerized REST API CI

on:
  push:
    paths:
      - "dockerized-api/**"
  pull_request:
    paths:
      - "dockerized-api/**"
  workflow_dispatch:

jobs:
  test:
    name: Build & Test in Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Tests in Docker
        run: |
          ./dockerized-api/run_tests.sh

      - name: Send status to Slack
        uses: rtCamp/action-slack-notify@v2
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "Dockerized REST API Build: ${{ job.status }}"
          SLACK_MESSAGE: |
            *Repository:* ${{ github.repository }}
            *Workflow:* ${{ github.workflow }}
            *Triggered by:* ${{ github.actor }} on `${{ github.ref_name }}`
            *Commit:* ${{ github.event.head_commit.message }}
            *Action Run:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || (job.status == 'cancelled' && '#808080' || 'danger') }}
